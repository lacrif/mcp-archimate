name: Unit Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test-node:
    name: Node.js / TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
