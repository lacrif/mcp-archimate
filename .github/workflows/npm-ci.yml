name: CI to npm

on:
  push:
    branches: ['**']
  pull_request:
    branches: [develop, main]

env:
  # Run JavaScript-based actions (checkout, setup-node, etc.) on Node 24 instead
  # of the deprecated Node 20 runner. Becomes the default on 2026-06-02 and is
  # required from 2026-09-16 when Node 20 is removed from runners.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm to support OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx eslint . --ext .ts

      - name: Run tests
        run: npm run test:ci

      - name: Run coverage
        run: npm run test:coverage

      - name: Upload test results to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: ./coverage
