services:
  mcp-archimate:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.json:/app/config.json:ro
      - ./data:/app/data:ro
    develop:
      watch:
        - action: rebuild
          path: ./src
        - action: rebuild
          path: ./package.json
        - action: rebuild
          path: ./package-lock.json
        - action: rebuild
          path: ./tsconfig.json
        - action: sync+restart
          path: ./config.json
          target: /app/config.json
        - action: sync
          path: ./data
          target: /app/data
